services:
  # The FerriShare service (includes frontend, backend and database)
  ferrishare:
    image: ghcr.io/tobiasmarschner/ferrishare:1
    container_name: ferrishare
    restart: unless-stopped

    networks:
      - docker-network

    # All data for FerriShare resides in the '/app/data'-directory.
    # This includes:
    #   config.toml       => Configuration generated by '--init'-flag
    #   user_templates/*  => User-configurable templates
    #   sqlite.db         => Application database
    #   uploaded_files/*  => Encrypted files uploaded by users
    # If desired, you can change the location of the config file with the '--config-file' CLI flag.
    # In that case, remember to provide a dedicated volume-mount for the file, too.
    # In Docker Compose you can provide the CLI flag like this:
    #command: ["--config-file", "/path/to/your/config.toml"]
    volumes:
      - file_storage:/app/data

volumes:
  file_storage:
    driver: local
    driver_opts:
      type: none
      device: /srv/docker/volumes/ferrishare/data
      o: size=16G

networks:
  docker-network:
    external: true
