<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lasercata's server</title>

    <link rel='stylesheet' href='style/main.css'>
</head>

<body>
    <header>
        <h1 id="title">Lasercata's server</h1>
    </header>
    <div class="center">
        <img src="./lasercata_logo.png" alt="Logo" class="center" style="height: 30vh; width: auto;">
    </div>
    <div id="button-container" id="content">
        <h2>Services:</h2>
        <div class='services-boxes-container'>
            <!-- <a href="https://git.lasercata.com/explore/repos" class="button">Git (Forgejo)</a> -->
            <!-- <a href="https://cryptpad.lasercata.com/" class="button">Collaboration suite + drive (Cryptpad)</a> -->
            <!-- <a href="https://enclosed.lasercata.com/" class="button">File and notes sharing (Enclosed)</a> -->
            <!-- <a href="https://share.lasercata.com/" class="button">File sharing (FerriShare)</a> -->
            <!-- <a href="https://s.lasercata.com/" class="button">URL shortener (Chhoto-url)</a> -->

            <a class='service-box' href='https://git.lasercata.com/explore/repos'>
                <img src='images/git_logo.png' class='service-logo'>
                <div class='service-box-text'>
                    <h2 class='service-title'>Forgejo</h2>
                    <p class='service-description'>Git service</p>
                </div>
            </a>
            <a class='service-box' href='https://cryptpad.lasercata.com/'>
                <img src='images/cryptpad_logo.png' class='service-logo'>
                <div class='service-box-text'>
                    <h2 class='service-title'>Cryptpad</h2>
                    <p class='service-description'>Collaboration suite + drive</p>
                </div>
            </a>
            <a class='service-box' href='https://enclosed.lasercata.com/'>
                <img src='images/enclosed_logo.png' class='service-logo'>
                <div class='service-box-text'>
                    <h2 class='service-title'>Enclosed</h2>
                    <p class='service-description'>Notes (text) sharing</p>
                </div>
            </a>
            <a class='service-box' href='https://share.lasercata.com/'>
                <img src='images/ferrishare_logo.png' class='service-logo'>
                <div class='service-box-text'>
                    <h2 class='service-title'>FerriShare</h2>
                    <p class='service-description'>File sharing</p>
                </div>
            </a>
            <a class='service-box' href='https://s.lasercata.com/'>
                <img src='images/chhoto-url_logo.png' class='service-logo'>
                <div class='service-box-text'>
                    <h2 class='service-title'>Chhoto-url</h2>
                    <p class='service-description'>URL shortener</p>
                </div>
            </a>
        </div>

    </div>
    <div id="footer">
        <p>
        Contact: <a href='mailto:contact@lasercata.com'>contact@lasercata.com</a>
        (PGP key available on <a href='https://keys.openpgp.org/search?q=contact%40lasercata.com'>keys.openpgp.org</a>)
        </p>
    </div>
</body>

</html>
