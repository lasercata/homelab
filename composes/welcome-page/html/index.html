<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome page</title>

    <style>
        :root {
            --lasercata-blue-color: #000; // #020f24;
            --lasercata-orange-color: #ff4500;
            --lasercata-dark-orange-color: #f02000;
        }
        header {
            padding: 1px;
            font-size: 5vh;
            text-align: center;
            background-color: var(--lasercata-blue-color);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: var(--lasercata-blue-color);
            font-family: Arial, sans-serif;
            color: white;
        }

        .center {
            margin: auto;
            width: 80%;
            padding: 5px;
            text-align: center;
        }

        #content {
            flex: 1; /* Expand and push the footer to the bottom */
            padding: 20px;
        }

        #footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            color: gray;
            font-size: 2vh;
        }

        #footer a {
            color: var(--lasercata-orange-color);
            text-decoration: none;
        }

        #footer a:hover {
            color: var(--lasercata-dark-orange-color);
        }

        #button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 5px 10px;
            margin: 0 10px;
            width: 90px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            color: #000;
            background-color: var(--lasercata-orange-color);
            border: 1px solid --lasercata-blue-color;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: var(--lasercata-dark-orange-color);
        }
    </style>
</head>

<body>
    <header>
        <h1 id="title">Lasercata's server</h1>
    </header>
    <div class="center">
        <img src="./lasercata_logo.png" alt="Logo" class="center" style="height: 30vh; width: auto;">
    </div>
    <div id="button-container" id="content">
        <p>Services:</p>
        <a href="https://gitlab.lasercata.com" class="button">gitlab</a>
    </div>
    <div id="footer">
    </div>
</body>

</html>
